<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<head>
    <title>Thêm/Sửa Sinh Viên</title>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .button { padding: 10px 20px; margin-top: 10px; cursor: pointer; margin-right: 5px; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>#{sinhVienBean.edit ? 'Sửa' : 'Thêm'} Sinh Viên</h1>
        
        <h:form>
            <div class="form-group">
                <label for="maSinhVien">Mã Sinh Viên:</label>
                <h:inputText id="maSinhVien" value="#{sinhVienBean.sinhVien.maSinhVien}" required="true" disabled="#{sinhVienBean.edit}"/>
                <h:message for="maSinhVien" styleClass="error"/>
            </div>

            <div class="form-group">
                <label for="hoTen">Họ Tên:</label>
                <h:inputText id="hoTen" value="#{sinhVienBean.sinhVien.hoTen}" required="true"/>
                <h:message for="hoTen" styleClass="error"/>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <h:inputText id="email" value="#{sinhVienBean.sinhVien.email}" required="true"/>
                <h:message for="email" styleClass="error"/>
            </div>

            <div class="form-group">
                <label for="lop">Lớp:</label>
                <h:selectOneMenu id="lop" value="#{sinhVienBean.sinhVien.lop}" required="true" style="width: 100%; padding: 8px;">
                    <f:selectItem itemLabel="--- Chọn Lớp ---" itemValue=""/>
                    <f:selectItems value="#{classBean.classList}"/>
                </h:selectOneMenu>
                <h:message for="lop" styleClass="error"/>
            </div>

            <h:commandButton value="#{sinhVienBean.edit ? '✏️ Cập Nhật' : '💾 Lưu'}" action="#{sinhVienBean.save()}" styleClass="button"/>
            <h:link value="🔙 Quay Lại" outcome="sinhvien-list" styleClass="button"/>
        </h:form>

        <h:messages globalOnly="true" styleClass="messages" layout="table"/>
    </div>
</body>
</html>
