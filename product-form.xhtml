<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<head>
    <title>Thêm Sản Phẩm</title>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .button { padding: 10px 20px; margin-top: 10px; cursor: pointer; margin-right: 5px; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Thêm Sản Phẩm</h1>
        
        <h:form>
            <div class="form-group">
                <label for="tenSanPham">Tên Sản Phẩm:</label>
                <h:inputText id="tenSanPham" value="#{productBean.product.tenSanPham}" required="true"/>
                <h:message for="tenSanPham" styleClass="error"/>
            </div>

            <div class="form-group">
                <label for="gia">Giá (VND):</label>
                <h:inputText id="gia" value="#{productBean.product.gia}" required="true" type="number"/>
                <h:message for="gia" styleClass="error"/>
            </div>

            <div class="form-group">
                <label for="soLuong">Số Lượng:</label>
                <h:inputText id="soLuong" value="#{productBean.product.soLuong}" required="true" type="number"/>
                <h:message for="soLuong" styleClass="error"/>
            </div>

            <h:commandButton value="💾 Lưu Sản Phẩm" action="#{productBean.save()}" styleClass="button"/>
            <h:link value="📋 Danh Sách SP" outcome="product-list" styleClass="button"/>
        </h:form>

        <h:messages globalOnly="true" layout="table"/>
    </div>
</body>
</html>
