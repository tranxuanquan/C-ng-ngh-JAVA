<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<head>
    <title>Danh Sách Sản Phẩm</title>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #FF9800; color: white; }
        tr:hover { background-color: #f5f5f5; }
        .button { padding: 5px 10px; cursor: pointer; margin: 0 5px; }
        a { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Danh Sách Sản Phẩm</h1>
        <h:form>
            <h:link value="➕ Thêm SP" outcome="product-form" styleClass="button"/>
            <h:link value="🏠 Trang Chủ" outcome="index" styleClass="button"/>
        </h:form>

        <h:dataTable value="#{productBean.dsProduct}" var="p" border="1" cellpadding="5">
            <h:column>
                <f:facet name="header">ID</f:facet>
                #{p.id}
            </h:column>
            <h:column>
                <f:facet name="header">Tên Sản Phẩm</f:facet>
                #{p.tenSanPham}
            </h:column>
            <h:column>
                <f:facet name="header">Giá (VND)</f:facet>
                #{p.gia}
            </h:column>
            <h:column>
                <f:facet name="header">Số Lượng</f:facet>
                #{p.soLuong}
            </h:column>
            <h:column>
                <f:facet name="header">Hành Động</f:facet>
                <h:form>
                    <h:commandButton value="🗑️ Xóa" action="#{productBean.delete(p.id)}" styleClass="button" onclick="return confirm('Xóa sản phẩm?')"/>
                </h:form>
            </h:column>
        </h:dataTable>

        <h:messages globalOnly="true" layout="table" style="margin-top: 20px;"/>
    </div>
</body>
</html>
