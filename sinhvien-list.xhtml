<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<head>
    <title>Danh Sách Sinh Viên</title>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:hover { background-color: #f5f5f5; }
        .button { padding: 5px 10px; cursor: pointer; margin: 0 5px; }
        .btn-delete { background-color: #f44336; color: white; }
        a { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Danh Sách Sinh Viên</h1>
        <h:form>
            <h:link value="➕ Thêm Mới" outcome="sinhvien-form" styleClass="button"/>
            <h:link value="🏠 Trang Chủ" outcome="index" styleClass="button"/>
            <br/>
            <label style="margin-top: 10px; margin-right: 10px;">🔍 Tìm kiếm (Họ tên hoặc Lớp):</label>
            <h:inputText value="#{sinhVienBean.keyword}" placeholder="Nhập tên hoặc lớp..." style="padding: 5px; width: 250px;"/>
            <h:commandButton value="Tìm" styleClass="button" style="width: auto;"/>
        </h:form>

        <h:dataTable value="#{sinhVienBean.dsSinhVien}" var="sv" border="1" cellpadding="5">
            <h:column>
                <f:facet name="header">ID</f:facet>
                #{sv.id}
            </h:column>
            <h:column>
                <f:facet name="header">Mã Sinh Viên</f:facet>
                #{sv.maSinhVien}
            </h:column>
            <h:column>
                <f:facet name="header">Họ Tên</f:facet>
                #{sv.hoTen}
            </h:column>
            <h:column>
                <f:facet name="header">Email</f:facet>
                #{sv.email}
            </h:column>
            <h:column>
                <f:facet name="header">Lớp</f:facet>
                #{sv.lop}
            </h:column>
            <h:column>
                <f:facet name="header">Hành Động</f:facet>
                <h:form>
                    <h:commandButton value="✏️ Sửa" action="#{sinhVienBean.edit(sv.id)}" styleClass="button"/>
                    <h:commandButton value="🗑️ Xóa" action="#{sinhVienBean.delete(sv.id)}" styleClass="button btn-delete" onclick="return confirm('Bạn chắc chắn muốn xóa?')"/>
                </h:form>
            </h:column>
        </h:dataTable>

        <h:messages globalOnly="true" styleClass="messages" layout="table" style="margin-top: 20px;"/>
    </div>
</body>
</html>
